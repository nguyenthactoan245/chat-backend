services:
  postgres:
    image: postgres:16-alpine
    container_name: chatapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-toan1234}
      POSTGRES_DB: ${DB_DATABASE:-chatapp}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: chatapp-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-toan1234}
      DB_DATABASE: ${DB_DATABASE:-chatapp}
      GROQ_API_KEY: ${GROQ_API_KEY}
    depends_on:
      - postgres

volumes:
  postgres_data:
